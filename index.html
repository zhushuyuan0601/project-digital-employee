<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lobster-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="联通助理小队 - 智能多 Agent 协作平台" />
    <title>联通小队</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              indigo: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
              purple: { 400: '#c084fc', 500: '#a855f7', 600: '#9333ea' },
              cyan: { 400: '#22d3ee', 500: '#06b6d4' },
              green: { 400: '#4ade80', 500: '#22c55e' },
              yellow: { 400: '#facc15', 500: '#eab308' },
              pink: { 400: '#f472b6', 500: '#ec4899' },
              rose: { 400: '#fb7185', 500: '#f43f5e' },
              orange: { 400: '#fb923c', 500: '#f97316' },
              blue: { 400: '#60a5fa', 500: '#3b82f6' },
              gray: { 200: '#e5e7eb', 300: '#d1d5db', 400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151', 800: '#1f2937' }
            }
          }
        }
      }
    </script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #f2f3f5 0%, #e8e9eb 100%);
      }
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f2f3f5 0%, #e8e9eb 100%);
        z-index: 9999;
      }
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        margin-top: 20px;
        color: white;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 2px;
      }
      .loading-subtext {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">联通小队</div>
      <div class="loading-subtext">中国联通风格</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
