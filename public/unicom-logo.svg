<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#E60012" stroke-width="3"/>
  
  <!-- 内部圆形装饰 -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#gradient1)" stroke-width="2" opacity="0.5"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="url(#gradient2)" stroke-width="1" opacity="0.3"/>
  
  <!-- 中心圆 -->
  <circle cx="50" cy="50" r="15" fill="url(#gradient3)"/>
  
  <!-- 爪子图形 -->
  <path d="M50 30 C55 40, 60 45, 55 50 C50 55, 45 50, 50 30" fill="white" opacity="0.9"/>
  <path d="M30 50 C40 45, 45 40, 50 45 C55 40, 60 45, 70 50 C60 55, 50 55, 50 55 C45 55, 40 55, 30 50" fill="white" opacity="0.9"/>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E60012;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E60012;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E60012;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>